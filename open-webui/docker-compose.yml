services:
  open-webui:
    image: openwebui/open-webui:0.9.6
    restart: unless-stopped
    networks:
      - acepanel-network
    ports:
      - "${OPEN_WEBUI_PORT_HTTP}:8080"
    environment:
      - TZ=${OPEN_WEBUI_TIME_ZONE}
      - OLLAMA_BASE_URL=${OPEN_WEBUI_OLLAMA_BASE_URL}
      - OPENAI_API_BASE_URL=${OPEN_WEBUI_OPENAI_API_BASE_URL}
      - OPENAI_API_KEY=${OPEN_WEBUI_OPENAI_API_KEY}
      - WEBUI_SECRET_KEY=${OPEN_WEBUI_SECRET_KEY}
      - WEBUI_AUTH=${OPEN_WEBUI_AUTH}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/app/backend/data
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsSL http://localhost:8080/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  acepanel-network:
    external: true
